services:
  postgres:
    image: postgres:16-alpine
    container_name: guru-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guru_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/database/migrations:/docker-entrypoint-initdb.d
      - ./db:/schema

  redis:
    image: redis:7-alpine
    container_name: guru-redis
    ports:
      - "6379:6379"

  web:
    image: node:20-alpine
    container_name: guru-web
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    depends_on:
      - api

  api:
    image: node:20-alpine
    container_name: guru-api
    working_dir: /app/backend
    command: sh -c "npm install && npm run dev"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/guru_ai
      REDIS_URL: redis://redis:6379
      PORT: 4000
    depends_on:
      - postgres
      - redis

  ai-service:
    image: python:3.11-slim
    container_name: guru-ai-service
    working_dir: /app/ai-service
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  code-sandbox:
    build:
      context: ./apps/code-sandbox
    container_name: guru-code-sandbox
    ports:
      - "5000:5000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
